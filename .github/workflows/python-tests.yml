name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CONTROL_TOWER_DATA_DIR: ${{ runner.temp }}/control-data
      CONTROL_TOWER_DB_PATH: ${{ runner.temp }}/control-data/control_tower.db
      CONTROL_TOWER_WORKDIARY_DIR: ${{ runner.temp }}/workdiary
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Prepare CI test environment
        run: |
          mkdir -p "$CONTROL_TOWER_DATA_DIR" "$CONTROL_TOWER_WORKDIARY_DIR" "$RUNNER_TEMP/ci-bin"
          for executable in codex gemini antigravity windsurf kilo opencode; do
            printf '#!/usr/bin/env bash\nexit 0\n' > "$RUNNER_TEMP/ci-bin/$executable"
            chmod +x "$RUNNER_TEMP/ci-bin/$executable"
          done
          echo "$RUNNER_TEMP/ci-bin" >> "$GITHUB_PATH"
          python - <<'PY'
          from scripts.db_base import init_db
          init_db()
          PY
      - name: Run tests
        run: python -m pytest tests/ -q
