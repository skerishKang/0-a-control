name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Prepare CI test environment
        run: |
          export CONTROL_TOWER_DATA_DIR="$RUNNER_TEMP/control-data"
          export CONTROL_TOWER_DB_PATH="$RUNNER_TEMP/control-data/control_tower.db"
          export CONTROL_TOWER_WORKDIARY_DIR="$RUNNER_TEMP/workdiary"
          echo "CONTROL_TOWER_DATA_DIR=$CONTROL_TOWER_DATA_DIR" >> "$GITHUB_ENV"
          echo "CONTROL_TOWER_DB_PATH=$CONTROL_TOWER_DB_PATH" >> "$GITHUB_ENV"
          echo "CONTROL_TOWER_WORKDIARY_DIR=$CONTROL_TOWER_WORKDIARY_DIR" >> "$GITHUB_ENV"
          mkdir -p "$CONTROL_TOWER_DATA_DIR" "$CONTROL_TOWER_WORKDIARY_DIR" "$RUNNER_TEMP/ci-bin"
          for executable in codex gemini antigravity windsurf kilo opencode; do
            printf '#!/usr/bin/env bash\nexit 0\n' > "$RUNNER_TEMP/ci-bin/$executable"
            chmod +x "$RUNNER_TEMP/ci-bin/$executable"
          done
          echo "$RUNNER_TEMP/ci-bin" >> "$GITHUB_PATH"
          python -c "from scripts.db_base import init_db; init_db()"
      - name: Run repository hygiene checks
        run: python scripts/check_repo_hygiene.py
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Run frontend static safety checks
        run: python scripts/check_frontend_safety.py
      - name: Run server smoke test
        run: |
          python - <<'PY'
          from scripts import smoke_server
          smoke_server.SERVER_START_TIMEOUT = 30
          smoke_server.wait_for_health.__defaults__ = (30,)
          raise SystemExit(smoke_server.main())
          PY
