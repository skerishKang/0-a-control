<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0-a-control 운영 본부 v2</title>
  <link rel="stylesheet" href="board-v2.css">
</head>
<body class="v2-body">
  <div class="v2-topbar">
    <div class="v2-topbar-inner">
      <span class="v2-topbar-title">운영 본부 v2</span>
      <div class="v2-topbar-center">
        <div id="v2PhaseTabs" class="v2-phase-tabs"></div>
        <span id="v2StatusLabel" class="v2-status-label"></span>
      </div>
      <a href="/index.html" class="v2-topbar-link">Classic 보기</a>
    </div>
  </div>
  <div id="boardV2Root" class="v2-root">
    <div class="v2-loading">데이터를 불러오는 중입니다...</div>
  </div>

  <!-- ── Detail Modal ── -->
  <div id="v2Modal" class="v2-modal" hidden>
    <div class="v2-modal-backdrop" onclick="window.boardV2CloseModal()"></div>
    <div class="v2-modal-content">
      <div class="v2-modal-header">
        <h3 id="v2ModalTitle" class="v2-modal-title">상세 정보</h3>
        <button type="button" class="v2-modal-close" onclick="window.boardV2CloseModal()" aria-label="닫기">×</button>
      </div>
      <div id="v2ModalBody" class="v2-modal-body">
        <!-- Content will be injected here -->
      </div>
    </div>
  </div>

  <script src="board-v2-shared.js"></script>
  <script src="board-v2-selectors.js"></script>
  <script src="board-v2-phase.js"></script>
  <script src="board-v2-render.js"></script>
  <script src="board-v2.js"></script>
</body>
</html>
